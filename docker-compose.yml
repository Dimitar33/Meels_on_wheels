
version: '3'
services:
  mongo:
    image: mongo
    ports:
      - "27017:27017"

  server:
    build: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.example
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
